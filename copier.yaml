# ref: <https://copier.readthedocs.io/en/stable/configuring/>
# ref: <https://gitlab.com/dreamer-labs/libraries/jinja2-ansible-filters/>
# ref: <https://jinja.palletsprojects.com/en/stable/templates/>

_answers_file: .config/copier/.copier-answers.shared.yaml

_envops:
  comment_start_string: "# {#"

_jinja_extensions:
  - cookiecutter.extensions.SlugifyExtension

_migrations:
  - command: rm --force '.envrc'
    version: v0.2.0
  - command: rm --force '.github/renovate.json'
    version: v0.2.0
  - command: rm --force '.github/workflows/copier-update.yaml'
    version: v0.2.3
  - command: rm --force '.github/workflows/mega-linter.yaml'
    version: v0.2.3

_subdirectory: template

project_name:
  type: str
  help: The project name, for example "Grapes".

project_name_slug:
  type: str
  help: A lowercase, URL-friendly project slug, for example "grapes".
  default: "{{ project_name | slugify }}"

author_name:
  type: str
  help: The author's name.
  default: liblaf

author_email:
  type: str
  help: The author's email address.
  default: 30631553+liblaf@users.noreply.github.com

license:
  type: str
  help: The project's license.
  default: MIT

github_user:
  type: str
  help: The GitHub username or organization name.
  default: "{{ author_name }}"

github_repo:
  type: str
  help: The GitHub repository name.
  default: "{{ project_name_slug }}"
