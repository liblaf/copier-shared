name: MegaLinter

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_COLOR: 1
  GIT_COMMIT_MESSAGE: "chore(mega-linter): apply linters automatic fixes"

jobs:
  mega-linter:
    name: MegaLinter
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    environment:
      name: MegaLinter
      deployment: false
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@c0ddb2356ceaa62ed3108a073f2e2a303264afa6 # v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: lint
        name: MegaLinter
        uses: liblaf/actions/mega-linter@c0ddb2356ceaa62ed3108a073f2e2a303264afa6 # v1
        with:
          token: ${{ steps.auth.outputs.token }}
      - if: success() || failure()
        name: Upload Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: mega-linter-reports
          path: |-
            mega-linter.log
            megalinter-reports
          include-hidden-files: true
      - if: success() || failure()
        name: Remove MegaLinter Reports
        run: |-
          cp --target-directory='${{ runner.temp }}' --verbose 'megalinter-reports/megalinter-report.md'
          sudo rm --force --recursive 'mega-linter.log' 'megalinter-reports'
      - if: steps.lint.outputs.has-updated-sources > 0 && github.ref == 'refs/heads/main'
        name: Create PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ steps.auth.outputs.token }}
          commit-message: ${{ env.GIT_COMMIT_MESSAGE }}
          branch: mega-linter/${{ github.ref_name }}
          sign-commits: true
          title: ${{ env.GIT_COMMIT_MESSAGE }}
          body-path: ${{ runner.temp }}/megalinter-report.md
          labels: |-
            automerge
            mega-linter
          assignees: ${{ github.repository_owner }}
          reviewers: ${{ github.repository_owner }}
      - if: steps.lint.outputs.has-updated-sources > 0 && github.ref != 'refs/heads/main'
        name: Commit
        uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          github_token: ${{ steps.auth.outputs.token }}
          commit_message: ${{ env.GIT_COMMIT_MESSAGE }}
          fail_on_self_push: false
