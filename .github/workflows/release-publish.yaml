    permissions:
      contents: write
    if: startsWith(github.head_ref, 'release-please/') && github.event.pull_request.merged
    runs-on: ubuntu-latest
    environment:
      name: release-please
      deployment: false
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@ba7e8a8be5abc0d1e1bac89ccc58f86204c06a20 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
