        env:
          TITLE: ${{ github.event.pull_request.title }}
      - name: Create tag
        run: |-
          git tag --annotate --message='${{ steps.version.outputs.tag }}' '${{ steps.version.outputs.tag }}'
          git push origin 'refs/tags/${{ steps.version.outputs.tag }}'
