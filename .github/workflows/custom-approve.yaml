name: Custom / Approve

on:
  pull_request:
    branches:
      - main

env:
  FORCE_COLOR: 1

jobs:
  approve:
    name: Approve
    permissions:
      pull-requests: write
    if: github.event.pull_request.user.login == 'pre-commit-ci[bot]'
    runs-on: ubuntu-latest
    environment:
      name: approve
      deployment: false
    steps:
      - id: auth
        name: Auth
        uses: liblaf/actions/auth@30c85b7c83d5db558c3113c5a7297837f6fe4904 # v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - name: Enable Auto-merge
        run: gh pr edit '${{ github.event.pull_request.html_url }}' --add-label
          'automerge'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Approve
        uses: liblaf/actions/approve@30c85b7c83d5db558c3113c5a7297837f6fe4904 # v1
        with:
          app: pre-commit-ci
          approve-token: ${{ steps.auth.outputs.token }}
          label: automerge
